<!-- Beginning elements are commented on the about.html file. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Cory Dutton</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <main>
      <!-- Creating a message to get in touch and send a message -->
      <div class="container">
        <div class="card-header">
          <h3>Get In Touch</h3>
          <p class="text-muted">Send me a message!</p>
        </div>
        <!-- Card body is for the input form -->
        <div class="card-body">
          <!-- Create a form that won't be validated upon submission. -->
          <form id="contactForm" novalidate>
            <!-- Applies margin -->
            <div class="mb-3">
              <label for="name" class="form-label">
                <!-- bold text -->
                <strong>Name</strong>
                <!-- hover color -->
                <span style="color: var(--hover-color)">*</span>
              </label>
              <!-- getting input group -->
              <input
                type="text"
                class="form-control"
                id="name"
                name="name"
                placeholder="Your full name"
                required
                aria-label="Full name"
              />
              <!-- class for invalid feedback -->
              <div class="invalid-feedback"></div>
            </div>

            <!-- Getting email -->
            <!-- Provides bottom margin -->
            <div class="mb-3">
              <!-- creates label for email input section -->
              <label for="email" class="form-label">
                <strong>Email</strong>
                <span style="color: var(--hover-color)">*</span>
              </label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                placeholder="your.email@example.com"
                required
                aria-label="Email address"
              />
              <div class="invalid-feedback"></div>
            </div>

            <!-- Getting phone number -->
            <div class="mb-3">
              <label for="phone" class="form-label">Phone (Optional)</label>
              <input
                type="tel"
                class="form-control"
                id="phone"
                name="phone"
                placeholder="+1 (555) 123-4567"
                aria-label="Phone number"
              />
              <div class="invalid-feedback"></div>
            </div>

            <!-- Getting the subject of the message -->
            <div class="mb-3">
              <label for="subject" class="form-label">
                <strong>Subject</strong>
                <span style="color: var(--hover-color)">*</span>
              </label>
              <input
                type="text"
                class="form-control"
                id="subject"
                name="subject"
                placeholder="What is this about?"
                required
                aria-label="Message subject"
              />
              <div class="invalid-feedback"></div>
            </div>

            <!-- Getting the message itself -->
            <div class="mb-3">
              <label for="message" class="form-label">
                <strong>Message</strong>
                <span style="color: var(--hover-color)">*</span>
              </label>
              <textarea
                class="form-control"
                id="message"
                name="message"
                rows="6"
                placeholder="Your message here..."
                required
                aria-label="Your message"
              ></textarea>
              <small class="form-text text-muted">Minimum 10 characters</small>
              <div class="invalid-feedback"></div>
            </div>

            <!-- d-grid makes buttons stack vertically on mobile, d-md-flex makes them side-by-side
             on medium screens, gap-2 adds space between buttons, and justify content-md-end
             aligns the buttons to the right on medium and above screens -->
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
              <!-- reset fields button -->
              <button
                type="reset"
                class="btn btn-secondary"
                aria-label="Clear form"
              >
                Clear
              </button>
              <!-- Send message button -->
              <button
                type="submit"
                class="btn btn-primary"
                aria-label="Send message"
              >
                Send Message
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <!-- Inject navbar and footer -->
    <script src="components.js"></script>
    <!-- running utility functions -->
    <script src="utilities.js"></script>
    <!-- runs last to set up form and validation -->
    <script src="contact-form.js"></script>
  </body>
</html>
